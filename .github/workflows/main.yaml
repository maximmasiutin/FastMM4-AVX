name: Build

on:
  push:
    branches:
      - master
    paths:
      - FastMM4.pas
      - FastMM4Messages.pas
      - FastMM4Options.inc
      - Tests/Advanced/**
      - Tests/Simple/IntegerOverflowTest.dpr
      - Tests/Simple/SimpleTest.dpr
      - Tests/Simple/CriticalSectionTest.dpr
      - Tests/Simple/SoftInvalidFreeMemTest.dpr

  pull_request:
    branches:
      - master
    paths:
      - FastMM4.pas
      - FastMM4Messages.pas
      - FastMM4Options.inc
      - Tests/Advanced/**
      - Tests/Simple/IntegerOverflowTest.dpr
      - Tests/Simple/SimpleTest.dpr
      - Tests/Simple/CriticalSectionTest.dpr
      - Tests/Simple/SoftInvalidFreeMemTest.dpr

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          persist-credentials: false

      - name: Update apt sources
        run: sudo apt-get update

      - name: Install Free Pascal and NASM
        run: sudo apt-get install -y fpc nasm

      - name: Compile AVX-512 Assembly for Linux
        run: |
          cd $GITHUB_WORKSPACE
          nasm -Ox -Ov -f elf64 FastMM4_AVX512_Linux.asm -o FastMM4_AVX512_Linux.o

      - name: Compile a simple demo in ObjFPC mode
        run: cd $GITHUB_WORKSPACE/Tests/Simple && fpc -B -MObjFPC -Tlinux -Px86_64 -O4 SimpleTest.dpr

      - name: Compile a simple demo in Delphi mode
        run: cd $GITHUB_WORKSPACE/Tests/Simple && fpc -B -Mdelphi -Tlinux -Px86_64 -O4 SimpleTest.dpr

      - name: Compile with -dDEBUG
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDEBUG -g -O- SimpleTest.dpr

      - name: Compile with -dDEBUG -dFullDebugMode
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDEBUG -g -dFullDebugMode -O- SimpleTest.dpr

      - name: Compile with -dFullDebugMode
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dFullDebugMode -O4 SimpleTest.dpr

      - name: Compile with -dAlign16Bytes
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dAlign16Bytes -O4 SimpleTest.dpr

      - name: Compile with -dAlign32Bytes
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dAlign32Bytes -O4 SimpleTest.dpr

      - name: Compile with -dDontUseCustomFixedSizeMoveRoutines
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDontUseCustomFixedSizeMoveRoutines -O4 SimpleTest.dpr

      - name: Compile with -dDontUseCustomVariableSizeMoveRoutines
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDontUseCustomVariableSizeMoveRoutines -O4 SimpleTest.dpr

      - name: Compile with -dForceSingleThreaded
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dForceSingleThreaded -O4 SimpleTest.dpr

      - name: Compile with -dDisablePauseAndSwitchToThread
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDisablePauseAndSwitchToThread -O4 SimpleTest.dpr

      - name: Compile with -dDontUseSmallBlocksLockedCriticalSection
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDontUseSmallBlocksLockedCriticalSection -O4 SimpleTest.dpr

      - name: Compile with -dDontUseMediumBlocksLockedCriticalSection
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDontUseMediumBlocksLockedCriticalSection -O4 SimpleTest.dpr

      - name: Compile with -dDontUseLargeBlocksLockedCriticalSection
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDontUseLargeBlocksLockedCriticalSection -O4 SimpleTest.dpr

      - name: Compile with -dDontUseASMVersion
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDontUseASMVersion -O4 SimpleTest.dpr

      - name: Compile with -dSoftInvalidFreeMem
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dSoftInvalidFreeMem -O4 SimpleTest.dpr

      - name: Compile with -dSoftInvalidFreeMem -dDontUseASMVersion
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dSoftInvalidFreeMem -dDontUseASMVersion -O4 SimpleTest.dpr

      - name: Compile with -dDisableMemoryLeakReporting
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDisableMemoryLeakReporting -O4 SimpleTest.dpr

      - name: Compile with -dRequireIDEPresenceForLeakReporting
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dRequireIDEPresenceForLeakReporting -O4 SimpleTest.dpr

      # =========================================================================
      # PurePascal / SynchroVar32bit Tests - Linux
      # Tests the Delphi Linux code path (SynchroVar32bit struct layout).
      # =========================================================================
      - name: Compile with -dPurePascal (SynchroVar32bit path)
        run: cd $GITHUB_WORKSPACE/Tests/Simple && fpc -B -Mdelphi -Tlinux -Px86_64 -dPurePascal -dIgnoreMemoryAllocatedBefore -O4 SimpleTest.dpr

      - name: Compile with -dPurePascal -dSoftInvalidFreeMem
        run: cd $GITHUB_WORKSPACE/Tests/Simple && fpc -B -Mdelphi -Tlinux -Px86_64 -dPurePascal -dSoftInvalidFreeMem -dIgnoreMemoryAllocatedBefore -O4 SimpleTest.dpr

      - name: Compile and run AdvancedTest (PurePascal)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -dPurePascal -dIgnoreMemoryAllocatedBefore -O4 AdvancedTest.dpr
          ./AdvancedTest

      - name: Compile and run AdvancedTest (PurePascal, overflow+range checks)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -Co -Cr -dPurePascal -dIgnoreMemoryAllocatedBefore -O4 AdvancedTest.dpr
          ./AdvancedTest

      # =========================================================================
      # Security Tests - Linux
      # =========================================================================
      - name: Compile and run Integer Overflow Test (64-bit Release with ASM)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dIgnoreMemoryAllocatedBefore -O4 IntegerOverflowTest.dpr
          ./IntegerOverflowTest

      - name: Compile and run Integer Overflow Test (64-bit Debug with ASM)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dIgnoreMemoryAllocatedBefore -dDEBUG -g -O- IntegerOverflowTest.dpr
          ./IntegerOverflowTest

      - name: Compile and run Integer Overflow Test (64-bit Release Pure Pascal)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dIgnoreMemoryAllocatedBefore -dDontUseASMVersion -O4 IntegerOverflowTest.dpr
          ./IntegerOverflowTest

      - name: Compile and run Integer Overflow Test (64-bit Debug Pure Pascal)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dIgnoreMemoryAllocatedBefore -dDontUseASMVersion -dDEBUG -g -O- IntegerOverflowTest.dpr
          ./IntegerOverflowTest

      # =========================================================================
      # Advanced Tests - Linux (AVX-512 enabled via FastMM4_AVX512_Linux.o)
      # =========================================================================
      - name: Compile and run AdvancedTest (Release)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -O4 -dIgnoreMemoryAllocatedBefore AdvancedTest.dpr
          ./AdvancedTest

      - name: Compile and run AdvancedTest (Debug)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDEBUG -dIgnoreMemoryAllocatedBefore -g -O- AdvancedTest.dpr
          ./AdvancedTest

      - name: Compile and run AdvancedTest (FullDebugMode)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -dFullDebugMode -dIgnoreMemoryAllocatedBefore -O4 AdvancedTest.dpr
          ./AdvancedTest

      - name: Compile and run AdvancedTest (Align16Bytes)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -dAlign16Bytes -dIgnoreMemoryAllocatedBefore -O4 AdvancedTest.dpr
          ./AdvancedTest

      - name: Compile and run AdvancedTest (Align32Bytes)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -dAlign32Bytes -dIgnoreMemoryAllocatedBefore -O4 AdvancedTest.dpr
          ./AdvancedTest

      - name: Compile and run AdvancedTest (ForceSingleThreaded)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -dForceSingleThreaded -dIgnoreMemoryAllocatedBefore -O4 AdvancedTest.dpr
          ./AdvancedTest

      - name: Compile and run AdvancedTest (DontUseASMVersion)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDontUseASMVersion -dIgnoreMemoryAllocatedBefore -O4 AdvancedTest.dpr
          ./AdvancedTest

      - name: Compile and run AdvancedTest (AlwaysClearFreedMemory)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -dAlwaysClearFreedMemory -dIgnoreMemoryAllocatedBefore -O4 AdvancedTest.dpr
          ./AdvancedTest

      - name: Compile and run AdvancedTest (DisableAVX512)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDisableAVX512 -dIgnoreMemoryAllocatedBefore -O4 AdvancedTest.dpr
          ./AdvancedTest

      # =========================================================================
      # Critical Section Tests - Linux
      # Uses -dDisablePauseAndSwitchToThread to force the CS code path
      # instead of the default spin-lock path.
      # =========================================================================
      - name: Compile and run CriticalSectionTest (Linux 64-bit, CS forced)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDisablePauseAndSwitchToThread -dIgnoreMemoryAllocatedBefore -O4 CriticalSectionTest.dpr
          ./CriticalSectionTest

      - name: Compile and run CriticalSectionTest (Linux 64-bit, CS forced, Pure Pascal)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dDisablePauseAndSwitchToThread -dDontUseASMVersion -dIgnoreMemoryAllocatedBefore -O4 CriticalSectionTest.dpr
          ./CriticalSectionTest

      - name: Compile and run CriticalSectionTest (Linux 64-bit, spin-lock path)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -dIgnoreMemoryAllocatedBefore -O4 CriticalSectionTest.dpr
          ./CriticalSectionTest

      # =========================================================================
      # SoftInvalidFreeMem Tests - Linux
      # Compiled with -Co -Cr to enable overflow and range checking (issue #39).
      # =========================================================================
      - name: Compile and run SoftInvalidFreeMemTest (Linux 64-bit, ASM, overflow+range checks)
        timeout-minutes: 2
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -Co -Cr -dSoftInvalidFreeMem -dIgnoreMemoryAllocatedBefore -O4 SoftInvalidFreeMemTest.dpr
          ./SoftInvalidFreeMemTest

      - name: Compile and run SoftInvalidFreeMemTest (Linux 64-bit, Pure Pascal, overflow+range checks)
        timeout-minutes: 2
        run: |
          cd $GITHUB_WORKSPACE/Tests/Simple
          fpc -B -Mdelphi -Tlinux -Px86_64 -Co -Cr -dSoftInvalidFreeMem -dDontUseASMVersion -dIgnoreMemoryAllocatedBefore -O4 SoftInvalidFreeMemTest.dpr
          ./SoftInvalidFreeMemTest

      # =========================================================================
      # Overflow and Range Check Tests - Linux
      # Verify that normal allocator operations work under strict checking.
      # =========================================================================
      - name: Compile and run AdvancedTest (Linux 64-bit, overflow+range checks, ASM)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -Co -Cr -dIgnoreMemoryAllocatedBefore -O4 AdvancedTest.dpr
          ./AdvancedTest

      - name: Compile and run AdvancedTest (Linux 64-bit, overflow+range checks, Pure Pascal)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -Co -Cr -dDontUseASMVersion -dIgnoreMemoryAllocatedBefore -O4 AdvancedTest.dpr
          ./AdvancedTest

      - name: Compile and run AdvancedTest (Linux 64-bit, overflow+range checks, SoftInvalidFreeMem)
        run: |
          cd $GITHUB_WORKSPACE/Tests/Advanced
          fpc -B -Mdelphi -Tlinux -Px86_64 -Co -Cr -dSoftInvalidFreeMem -dIgnoreMemoryAllocatedBefore -O4 AdvancedTest.dpr
          ./AdvancedTest

  build_windows:
    runs-on: windows-latest
    env: 
      fpc: 'C:\FPC\3.2.2\bin\i386-win32\fpc.exe'
      nasm: 'C:\Program Files\NASM\nasm.exe'

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          persist-credentials: false

      - name: Disable Windows Error Reporting dialogs
        run: |
          reg add "HKCU\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /v DontShowUI /t REG_DWORD /d 1 /f

      - name: Download FreePascal installer
        run: |
          & 'curl.exe' @('-L', '-o', 'fpc_installer.exe', 'https://sourceforge.net/projects/freepascal/files/Win32/3.2.2/fpc-3.2.2.win32.and.win64.exe/download')

      - name: Install FreePascal silently
        run: |
          & '.\fpc_installer.exe' @('/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/SP-', '/LOG')
          Wait-Process -Name fpc_installer -Timeout 600

      - name: Install NASM via Chocolatey
        run: |
          & 'choco.exe' @('install', 'nasm', '-y')

      - name: Output the installation log
        run: |
          Get-ChildItem -Path "$env:TEMP\Setup Log *.txt" | ForEach-Object { 
            Write-Host "=== Log file: $($_.FullName) ==="
            Get-Content -Path $_.FullName
          }
  
      - name: Compile by FreePascal 32-bit with -dDisableAsmCodeAlign
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dDisableAsmCodeAlign', 'SimpleTest.dpr')


      - name: Compile by FreePascal 32-bit with -dAlign16Bytes
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dAlign16Bytes', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 32-bit with -dAlign32Bytes 
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dAlign32Bytes', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 32-bit with -dDontUseCustomFixedSizeMoveRoutines
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dDontUseCustomFixedSizeMoveRoutines', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 32-bit with -dDontUseCustomVariableSizeMoveRoutines
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dDontUseCustomVariableSizeMoveRoutines', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 32-bit with -dForceSingleThreaded
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dForceSingleThreaded', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 32-bit with -dDisablePauseAndSwitchToThread 
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple 
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dDisablePauseAndSwitchToThread', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 32-bit with -dDontUseSmallBlocksLockedCriticalSection
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dDontUseSmallBlocksLockedCriticalSection', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 32-bit with -dDontUseMediumBlocksLockedCriticalSection 
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dDontUseMediumBlocksLockedCriticalSection', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 32-bit with -dDontUseLargeBlocksLockedCriticalSection
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dDontUseLargeBlocksLockedCriticalSection', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 32-bit with -dDontUseASMVersion
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dDontUseASMVersion', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 32-bit with -dDisableMemoryLeakReporting
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dDisableMemoryLeakReporting', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 32-bit with -dRequireIDEPresenceForLeakReporting
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dRequireIDEPresenceForLeakReporting', '-O4', 'SimpleTest.dpr')

      - name: Compile AVX-512 Assembly
        run: |
          cd $Env:GITHUB_WORKSPACE
          & '${{ env.nasm }}' @('-Ox', '-Ov', '-f', 'win64', 'FastMM4_AVX512.asm')

      - name: Compile by FreePascal 64-bit with DisableAVX512 to test .noframe
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dDisableAVX512', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 64-bit with -dDisableAsmCodeAlign
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dDisableAsmCodeAlign', '-O4', 'SimpleTest.dpr')


      - name: Compile by FreePascal 64-bit with -dAlign16Bytes
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dAlign16Bytes', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 64-bit with -dAlign32Bytes 
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dAlign32Bytes', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 64-bit with -dDontUseCustomFixedSizeMoveRoutines
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dDontUseCustomFixedSizeMoveRoutines', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 64-bit with -dDontUseCustomVariableSizeMoveRoutines
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dDontUseCustomVariableSizeMoveRoutines', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 64-bit with -dForceSingleThreaded
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dForceSingleThreaded', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 64-bit with -dDisablePauseAndSwitchToThread 
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple 
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dDisablePauseAndSwitchToThread', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 64-bit with -dDontUseSmallBlocksLockedCriticalSection
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dDontUseSmallBlocksLockedCriticalSection', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 64-bit with -dDontUseMediumBlocksLockedCriticalSection 
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dDontUseMediumBlocksLockedCriticalSection', '-O4','SimpleTest.dpr')

      - name: Compile by FreePascal 64-bit with -dDontUseLargeBlocksLockedCriticalSection
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dDontUseLargeBlocksLockedCriticalSection', '-O4','SimpleTest.dpr')

      - name: Compile by FreePascal 64-bit with -dDontUseASMVersion
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dDontUseASMVersion', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 64-bit with -dSoftInvalidFreeMem
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dSoftInvalidFreeMem', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 32-bit with -dSoftInvalidFreeMem
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin32', '-Pi386', '-dSoftInvalidFreeMem', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 64-bit with -dDisableMemoryLeakReporting
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dDisableMemoryLeakReporting', '-O4', 'SimpleTest.dpr')

      - name: Compile by FreePascal 64-bit with -dRequireIDEPresenceForLeakReporting
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dRequireIDEPresenceForLeakReporting', '-O4', 'SimpleTest.dpr')

      # =========================================================================
      # PurePascal / SynchroVar32bit Tests - Windows
      # =========================================================================
      - name: Compile by FreePascal 64-bit with -dPurePascal (SynchroVar32bit path)
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dPurePascal', '-dIgnoreMemoryAllocatedBefore', '-O4', 'SimpleTest.dpr')

      - name: Compile and run AdvancedTest 64-bit (PurePascal)
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Advanced
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dPurePascal', '-dIgnoreMemoryAllocatedBefore', '-dDisableMemoryLeakReporting', '-O4', 'AdvancedTest.dpr')
          & '.\AdvancedTest.exe'

      # =========================================================================
      # ml64 Assembly Operand Size Check - Windows
      # FPC silently accepts operand size mismatches that Delphi dcc64 rejects.
      # Generate MASM assembly via FPC, fix FPC-specific directives, then run
      # ml64 to catch A2024 (invalid operand size) errors.
      # =========================================================================
      - name: Check assembly operand sizes via ml64
        run: |
          cd $Env:GITHUB_WORKSPACE/Tests/Simple
          # Generate MASM assembly without assembling
          & '${{ env.fpc }}' @('-B', '-Mdelphi', '-Twin64', '-Px86_64', '-dDisableAsmCodeAlign', '-Amasm', '-s', 'SimpleTest.dpr')
          # Find ml64 via vswhere (faster and more reliable than recursive search)
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $ml64Path = Join-Path $vsPath "VC\Tools\MSVC\*\bin\Hostx64\x64\ml64.exe" | Resolve-Path | Select-Object -First 1
          if (-not $ml64Path) { Write-Error "ml64.exe not found via vswhere"; exit 1 }
          # Fix ALIGN 32 directives (FPC generates these but ml64 rejects them in _TEXT segments)
          $asmFile = "$Env:GITHUB_WORKSPACE\FastMM4.s"
          $fixedFile = "$Env:GITHUB_WORKSPACE\FastMM4_fixed.s"
          (Get-Content $asmFile -Encoding UTF8) -replace 'ALIGN 32', 'ALIGN 16' | Set-Content $fixedFile -Encoding UTF8
          # Truncate at debug info section (ml64 cannot parse FPC debug directives)
          $lines = Get-Content $fixedFile -Encoding UTF8
          $cutoff = ($lines | Select-String -Pattern '^; Begin asmlist al_dwarf_frame' | Select-Object -First 1).LineNumber
          if ($cutoff) { $lines[0..($cutoff-2)] | Set-Content $fixedFile -Encoding UTF8 }
          # Run ml64 and capture output
          $output = & $ml64Path /c /Cx $fixedFile 2>&1 | Out-String
          Write-Host $output
          # Fail on operand size errors (A2024) or invalid instruction operands (A2070)
          if ($output -match 'A2024|A2070') {
            Write-Error "ml64 detected assembly errors. Fix operand size mismatches."
            exit 1
          }
          Write-Host "ml64 operand size check passed."

